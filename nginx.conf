server {
    listen 80;
    server_name benomad.travel www.benomad.travel localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security: Hide nginx version
    server_tokens off;

    # Security: Limit request size (prevents large file uploads)
    client_max_body_size 10M;

    # Security: Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req zone=general burst=20 nodelay;

    # Handle client-side routing (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security headers for main content
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.mapbox.com; style-src 'self' 'unsafe-inline' https://api.mapbox.com; img-src 'self' data: https: blob:; font-src 'self' data: https:; connect-src 'self' https: wss: data:; worker-src 'self' blob:;" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # API proxy to guryeli.com
    location /nomad/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_target https://guryeli.com;
        proxy_pass $upstream_target;
        proxy_ssl_server_name on;
        proxy_set_header Host guryeli.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security: Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|log|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        text/javascript
        application/atom+xml
        image/svg+xml;

    # Cache static assets with security headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        
        # Security: Prevent hotlinking
        valid_referers none blocked server_names localhost;
        if ($invalid_referer) {
            return 403;
        }
    }

    # Security: Block common attack patterns
    location ~* (eval\(|base64_decode|gzinflate|rot13|str_rot13) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error pages (optional - prevents information disclosure)
    error_page 403 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
