version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_MAPBOX_ACCESS_TOKEN=${VITE_MAPBOX_ACCESS_TOKEN}
        - VITE_API_BASE=
    ports:
      - "8080:80"
    container_name: nomad-client
    restart: always
    environment:
      - VITE_MAPBOX_ACCESS_TOKEN=${VITE_MAPBOX_ACCESS_TOKEN}
      - VITE_API_BASE=
    networks:
      - nomad-network

networks:
  nomad-network:
    driver: bridge
